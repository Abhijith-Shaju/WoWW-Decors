<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gallery - WoWW Decors</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

  <style>
    /* minimal custom CSS — tailwind for the rest */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      grid-auto-rows: 8px; /* tiny row unit so JS can set exact spans */
      max-width: 1120px;
      margin: 0 auto;
    }
    @media (max-width: 1024px){ .gallery-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 640px){ .gallery-grid { grid-template-columns: 1fr; } }

    /* keep height:auto while measuring, then JS will set height:100% to perfectly fill spanned rows */
    .gallery-item img{ width:100%; height:auto; display:block; object-fit:cover; }
    .image-overlay{ position:absolute; inset:0; display:flex; align-items:flex-end; padding:1rem;
      background:linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,0)); opacity:0; transition:opacity .18s;}
    .gallery-item:hover .image-overlay{ opacity:1; }
  </style>
</head>
<body class="antialiased bg-purple-50">

<header class="bg-white shadow-sm">
  <nav class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
    <div class="text-2xl font-extrabold text-gray-800">WoWW Decors.</div>
    <div class="hidden md:flex gap-8 text-gray-700 font-medium">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="gallery.html" class="text-purple-600 border-b-2 border-purple-600">Gallery</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>
</header>

<main class="max-w-6xl mx-auto px-6 py-10">
  <h1 class="text-4xl font-extrabold mb-6 text-center md:text-left text-gray-800">📸 Our Portfolio in Bloom</h1>

  <div id="category-buttons" class="flex flex-wrap gap-3 mb-8 justify-center md:justify-start">
    <button class="category-btn px-5 py-2 rounded-full text-sm font-medium bg-purple-600 text-white" data-category="All Events">All Events</button>
    <button class="category-btn px-5 py-2 rounded-full text-sm font-medium text-gray-700 hover:bg-purple-100" data-category="Weddings">Weddings</button>
    <button class="category-btn px-5 py-2 rounded-full text-sm font-medium text-gray-700 hover:bg-purple-100" data-category="Social Affairs">Social Affairs</button>
    <button class="category-btn px-5 py-2 rounded-full text-sm font-medium text-gray-700 hover:bg-purple-100" data-category="Best Blogs">Best Blogs</button>
    <button class="category-btn px-5 py-2 rounded-full text-sm font-medium text-gray-700 hover:bg-purple-100" data-category="Corporate">Corporate</button>
  </div>

  <div id="gallery-grid" class="gallery-grid px-2">
    <!-- injected -->
  </div>
</main>

<footer class="bg-gray-800 text-white mt-12">
  <div class="max-w-6xl mx-auto px-6 py-10 grid md:grid-cols-4 gap-6">
    <div><h3 class="font-bold text-lg">WoWW Decors.</h3><p class="mt-2 text-sm text-gray-200">Crafting extraordinary celebrations.</p></div>
    <div><h4 class="font-semibold">Explore</h4><ul class="mt-2 text-sm text-gray-200 space-y-1"><li>Home</li><li>About</li><li>Services</li><li>Gallery</li></ul></div>
    <div><h4 class="font-semibold">Visit Us</h4><p class="mt-2 text-sm text-gray-200">1234 Main St, City</p></div>
    <div><h4 class="font-semibold">Stay Inspired</h4><div class="mt-3"><input type="email" placeholder="newsletter@add.com" class="w-full px-3 py-2 rounded bg-gray-700 text-white placeholder-gray-300"/><button class="mt-3 px-4 py-2 bg-purple-600 rounded text-white font-semibold">Subscribe</button></div></div>
  </div>
  <div class="text-center text-sm bg-gray-900 py-3">© 2025 WoWW Decors. All Rights Reserved.</div>
</footer>

<script>
  // simplified data + renderer + improved span logic to avoid leftover bottom space
  const galleryData = [
    { src: 'resources/images/hehe.png', caption: 'Bridal Moments', category: 'Weddings' },
    { src: 'resources/images/hello.jpeg', caption: 'Royal Dinner', category: 'Weddings' },
    { src: 'resources/images/hii.jpeg', caption: 'Intimate Interiors', category: 'Social Affairs' },
    { src: 'resources/images/huh.png', caption: 'Outdoor Charm', category: 'Weddings' },
    { src: 'resources/images/hainn.png', caption: 'The Ballroom', category: 'Corporate' },
    { src: 'resources/images/extra-1.png', caption: 'Gala Night', category: 'Corporate' },
    { src: 'resources/images/extra-2.png', caption: 'Charity Event', category: 'Social Affairs' },
    { src: 'resources/images/extra-3.png', caption: 'Venue Feature', category: 'Best Blogs' },
    { src: 'resources/images/extra-4.png', caption: 'Planning Tips', category: 'Best Blogs' }
  ];

  const $grid = $('#gallery-grid');

  function makeCard(item){
    return $(` 
      <div class="gallery-item relative rounded-lg overflow-hidden bg-gray-100 shadow-md transform transition hover:scale-105">
        <img src="${item.src}" alt="${item.caption}" loading="lazy"/>
        <div class="image-overlay"><span class="text-white font-semibold">${item.caption}</span></div>
      </div>
    `);
  }

  // compute row span based on natural aspect ratio and card width,
  // then set img height:100% so it exactly fills the spanned rows — eliminates bottom gap.
  function applySpan($el){
    const img = $el.find('img')[0];
    if(!img || !img.naturalWidth || !img.naturalHeight) return;
    const grid = $grid[0];
    const row = parseFloat(getComputedStyle(grid).getPropertyValue('grid-auto-rows')) || 8;
    const gap = parseFloat(getComputedStyle(grid).getPropertyValue('gap')) || 16;

    // use element content width for precise expected height
    const cardWidth = $el.width();
    const expectedHeight = (img.naturalHeight / img.naturalWidth) * cardWidth;

    // small eps to avoid rounding issues
    const eps = 0.5;
    const span = Math.max(1, Math.ceil((expectedHeight + gap - eps) / (row + gap)));

    $el.css('grid-row-end', 'span ' + span);

    // set image to fill the spanned grid area exactly
    // this prevents a few-pixel white/bottom gap caused by subpixel rounding
    $($el.find('img')).css({ height: '100%', width: '100%', 'object-fit': 'cover' });
  }

  function render(category = 'All Events'){
    $grid.empty();
    const list = category === 'All Events' ? galleryData : galleryData.filter(x => x.category === category);
    list.forEach((item, idx) => {
      const $card = makeCard(item);
      $grid.append($card);

      const $img = $card.find('img');

      $img.on('load error', function(){
        const ar = (this.naturalWidth || 1) / (this.naturalHeight || 1);
        $($img).css('object-position', ar < 0.9 ? 'bottom center' : 'center center');

        // ensure img is auto while measuring (in case)
        $($img).css({ height: 'auto', width: '100%' });

        applySpan($card);

        // make first item prominent on wide screens
        if(idx === 0 && window.innerWidth >= 1024){
          $card.css('grid-column-end', 'span 2');
          applySpan($card);
        } else {
          $card.css('grid-column-end', '');
        }
      });

      if($img[0].complete) $img.trigger('load');
    });

    // small screens: clear forced spans and reset img heights for natural flow
    setTimeout(()=>{ 
      if(window.innerWidth < 768) $grid.children().css({'grid-row-end':'','grid-column-end':''}).find('img').css({height:'auto', width:'100%'}); 
    }, 100);
  }

  $(function(){
    render();
    $('.category-btn').on('click', function(){
      $('.category-btn').removeClass('bg-purple-600 text-white');
      $(this).addClass('bg-purple-600 text-white');
      render($(this).data('category'));
    });

    let t;
    $(window).on('resize', function(){
      clearTimeout(t);
      t = setTimeout(function(){
        $grid.children().each(function(){ 
          if(window.innerWidth < 768){ 
            $(this).css({'grid-row-end':'','grid-column-end':''}).find('img').css({height:'auto', width:'100%'}); 
          } else applySpan($(this)); 
        });
      },120);
    });
  });
</script>
</body>
</html>
